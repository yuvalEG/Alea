name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Validate VST3 with pluginval
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip -OutFile pluginval.zip
          Expand-Archive pluginval.zip -DestinationPath pluginval
          # GUI tests need an interactive desktop, which CI runners lack;
          # the macOS release checklist runs them for real. Gate on the
          # printed verdict: pluginval can crash during its own shutdown in
          # the desktop-less session even after all tests pass.
          $out = & .\pluginval\pluginval.exe --strictness-level 10 --skip-gui-tests --validate "build\Alea_artefacts\Release\VST3\Alea Scale Shifter.vst3" 2>&1 | Out-String
          Write-Host $out
          if ($out -notmatch "SUCCESS") { exit 1 }

      - name: Read version
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path CMakeLists.txt -Pattern 'project\(Alea VERSION ([0-9.]+)\)').Matches.Groups[1].Value
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVersion=${{ steps.ver.outputs.version }} installer\windows\alea.iss

      - name: Zip portable build
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory portable | Out-Null
          Copy-Item -Recurse "build\Alea_artefacts\Release\VST3\Alea Scale Shifter.vst3" portable\
          Copy-Item "build\Alea_artefacts\Release\CLAP\Alea Scale Shifter.clap" portable\
          Copy-Item "build\Alea_artefacts\Release\Standalone\Alea Scale Shifter.exe" portable\
          Compress-Archive -Path portable\* -DestinationPath "build\Alea-$v-Windows-Portable.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: alea-windows
          path: |
            build/Alea-*-Windows-Setup.exe
            build/Alea-*-Windows-Portable.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} (Get-Item build\Alea-*-Windows-Setup.exe).FullName (Get-Item build\Alea-*-Windows-Portable.zip).FullName --clobber
