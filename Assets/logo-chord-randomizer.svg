<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Alea Chord Randomizer">
  <defs>
    <radialGradient id="cr-tile" cx="38%" cy="30%" r="90%">
      <stop offset="0%" stop-color="#1b1930"></stop>
      <stop offset="55%" stop-color="#0f0e18"></stop>
      <stop offset="100%" stop-color="#08080d"></stop>
    </radialGradient>
    <linearGradient id="cr-edge" x1="90" y1="120" x2="400" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b06bff"></stop>
      <stop offset="50%" stop-color="#7c3aed"></stop>
      <stop offset="100%" stop-color="#22d3ee"></stop>
    </linearGradient>
    <linearGradient id="cr-top" x1="120" y1="120" x2="392" y2="278" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#211a3a"></stop>
      <stop offset="100%" stop-color="#0f1a2b"></stop>
    </linearGradient>
    <linearGradient id="cr-left" x1="120" y1="199" x2="256" y2="436" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1330"></stop>
      <stop offset="100%" stop-color="#0c0a16"></stop>
    </linearGradient>
    <linearGradient id="cr-right" x1="256" y1="278" x2="392" y2="357" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1a26"></stop>
      <stop offset="100%" stop-color="#0a1016"></stop>
    </linearGradient>
    <linearGradient id="cr-note" x1="150" y1="270" x2="230" y2="370" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d9b8ff"></stop>
      <stop offset="100%" stop-color="#a855f7"></stop>
    </linearGradient>
    <clipPath id="cr-leftclip"><path d="M120,199 L256,278 L256,436 L120,357 Z"></path></clipPath>
    <filter id="cr-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="cr-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="34"></feGaussianBlur>
    </filter>
  </defs>

  <rect x="6" y="6" width="500" height="500" rx="112" fill="url(#cr-tile)"></rect>
  <ellipse cx="150" cy="380" rx="150" ry="130" fill="#7c3aed" opacity="0.20" filter="url(#cr-soft)"></ellipse>
  <ellipse cx="380" cy="200" rx="150" ry="130" fill="#06b6d4" opacity="0.18" filter="url(#cr-soft)"></ellipse>

  <g filter="url(#cr-glow)" transform="translate(256,278) scale(1.25) translate(-256,-278)">
    <path d="M256,120 L392,199 L256,278 L120,199 Z" fill="url(#cr-top)"></path>
    <path d="M120,199 L256,278 L256,436 L120,357 Z" fill="url(#cr-left)"></path>
    <path d="M256,278 L392,199 L392,357 L256,436 Z" fill="url(#cr-right)"></path>

    
    <g>
      <g clip-path="url(#cr-leftclip)" stroke="#aeb6cc" stroke-width="2" opacity="0.32" stroke-linecap="round">
        <line x1="164.7" y1="276.4" x2="237.5" y2="318.6"></line>
        <line x1="158.1" y1="287.6" x2="230.9" y2="329.8"></line>
        <line x1="151.6" y1="298.9" x2="224.4" y2="341.1"></line>
        <line x1="145.1" y1="310.2" x2="217.9" y2="352.4"></line>
        <line x1="138.5" y1="321.5" x2="211.3" y2="363.7"></line>
      </g>
      <path d="M147,338 L177,356" fill="none" stroke="#cbb6f0" stroke-width="3.5" stroke-linecap="round"></path>
      <path d="M168,353 L233,287" fill="none" stroke="url(#cr-note)" stroke-width="5.5" stroke-linecap="round"></path>
      <g fill="url(#cr-note)">
        <circle cx="162" cy="347" r="12"></circle>
        <circle cx="188" cy="320" r="12"></circle>
        <circle cx="214" cy="293" r="12"></circle>
      </g>
    </g>

    
    <g fill="#22d3ee">
      <circle cx="256" cy="164" r="12" fill="#8f7bf0"></circle>
      <circle cx="196" cy="199" r="12" fill="#b06bff"></circle>
      <circle cx="316" cy="199" r="12" fill="#22d3ee"></circle>
      <circle cx="256" cy="234" r="12" fill="#5bc8ee"></circle>
      <circle cx="256" cy="199" r="12" fill="#7c9cf0"></circle>
    </g>

    
    <circle cx="324" cy="318" r="14" fill="#22d3ee"></circle>

    <g fill="none" stroke="url(#cr-edge)" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
      <path d="M256,120 L392,199 L392,357 L256,436 L120,357 L120,199 Z"></path>
      <path d="M120,199 L256,278 L392,199"></path>
      <path d="M256,278 L256,436"></path>
    </g>
  </g>
</svg>